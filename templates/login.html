{% extends 'base.html' %}

{% block content %}
<!-- Google Fonts for Futuristic Typography -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

  :root {
    --primary: #00f2fe;
    --accent: #9d4edd;
    --violet: #7f00ff;
    --bg-space: #070314;
    --glass-bg: rgba(11, 7, 34, 0.55);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-color: #f1f3f9;
  }

  body {
    background-color: var(--bg-space) !important;
    font-family: 'Outfit', sans-serif !important;
    margin: 0;
    overflow-x: hidden;
  }

  /* Fullscreen Space Wrapper to override default bootstrap container rules */
  .login-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 50% 50%, #0d072b 0%, #03010b 100%);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }

  /* HTML5 Space Canvas */
  #space-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* ─── Wide revolving planet horizon (matches reference) ─── */
  .planet-horizon {
    position: absolute;
    bottom: -52vh;
    left: 50%;
    transform: translateX(-50%) translate(calc(var(--mx, 0) * 10px), calc(var(--my, 0) * 10px));
    width: 160vw;
    height: 90vh;
    border-radius: 50%;
    overflow: hidden;
    box-shadow:
      0 -2px 0 rgba(180, 50, 255, 0.7),
      0 -6px 30px rgba(127, 0, 255, 0.50),
      0 -18px 65px rgba(0, 242, 254, 0.22),
      inset 0 30px 80px rgba(0, 0, 0, 0.9);
    border-top: 1.5px solid rgba(180, 50, 255, 0.55);
    z-index: 3;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.1, 0.9, 0.2, 1);
  }

  /* Scrolling surface lattice — creates revolution illusion */
  .planet-texture {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(0, 242, 254, 0.04) 39px),
      repeating-linear-gradient(90deg, transparent, transparent 55px, rgba(127, 0, 255, 0.05) 56px);
    background-size: 56px 39px;
    animation: planetRevolve 60s linear infinite;
    z-index: 1;
  }

  @keyframes planetRevolve {
    from {
      background-position: 0 0;
    }

    to {
      background-position: 560px 0;
    }
  }

  /* Fixed lighting gradient — stays still while texture scrolls */
  .planet-shading {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% -10%,
        rgba(127, 0, 255, 0.40) 0%,
        rgba(10, 5, 28, 0.82) 45%,
        #03010b 80%);
    z-index: 2;
  }

  /* Wide aurora / sun-rise behind planet top edge */
  .sun-glow {
    position: absolute;
    bottom: -28vh;
    left: 50%;
    transform: translateX(-50%) translate(calc(var(--mx, 0) * 6px), calc(var(--my, 0) * 6px));
    width: 130vw;
    height: 72vh;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 0%,
        rgba(200, 60, 255, 0.70) 0%,
        rgba(0, 242, 254, 0.45) 20%,
        rgba(127, 0, 255, 0.18) 45%,
        transparent 70%);
    filter: blur(20px);
    z-index: 2;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.1, 0.9, 0.2, 1);
  }

  /* Space Nebulas */
  .nebula-purple {
    position: absolute;
    top: -10%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(127, 0, 255, 0.08) 0%, transparent 65%);
    z-index: 1;
    pointer-events: none;
  }

  .nebula-cyan {
    position: absolute;
    bottom: -10%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 242, 254, 0.05) 0%, transparent 65%);
    z-index: 1;
    pointer-events: none;
  }

  /* Star wrappers for parallax */
  .star-wrapper {
    position: absolute;
    z-index: 2;
    pointer-events: none;
    transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
  }

  .star-wrapper.star-1 {
    top: 18%;
    left: 15%;
    transform: translate(calc(var(--mx, 0) * 22px), calc(var(--my, 0) * 22px));
  }

  .star-wrapper.star-2 {
    top: 35%;
    right: 15%;
    transform: translate(calc(var(--mx, 0) * 35px), calc(var(--my, 0) * -35px));
  }

  .star-wrapper.star-3 {
    top: 72%;
    left: 12%;
    transform: translate(calc(var(--mx, 0) * 18px), calc(var(--my, 0) * 18px));
  }

  .floating-star {
    width: 32px;
    height: 32px;
    opacity: 0.6;
    filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5));
  }

  .star-wrapper.star-1 .floating-star {
    animation: float1 7s ease-in-out infinite, rotateSlow 24s linear infinite;
  }

  .star-wrapper.star-2 .floating-star {
    width: 44px;
    height: 44px;
    filter: drop-shadow(0 0 10px rgba(127, 0, 255, 0.6));
    animation: float2 10s ease-in-out infinite 1s, rotateSlow 30s linear infinite reverse;
  }

  .star-wrapper.star-3 .floating-star {
    width: 24px;
    height: 24px;
    animation: float3 8s ease-in-out infinite 2s, rotateSlow 18s linear infinite;
  }

  @keyframes float1 {

    0%,
    100% {
      transform: translateY(0) translateX(0);
    }

    50% {
      transform: translateY(-10px) translateX(6px);
    }
  }

  @keyframes float2 {

    0%,
    100% {
      transform: translateY(0) translateX(0);
    }

    50% {
      transform: translateY(-18px) translateX(-8px);
    }
  }

  @keyframes float3 {

    0%,
    100% {
      transform: translateY(0) translateX(0);
    }

    50% {
      transform: translateY(-8px) translateX(4px);
    }
  }

  @keyframes rotateSlow {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  /* Glassmorphism Login Card styling */
  .login-box {
    position: relative;
    background: var(--glass-bg);
    width: 450px;
    max-width: 90%;
    padding: 65px 40px 42px 40px;
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7),
      0 0 45px rgba(127, 0, 255, 0.12),
      inset 0 1px 1px rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 5;
    transform-style: preserve-3d;
    perspective: 1000px;
    transform: translate(calc(var(--mx, 0) * -3px), calc(var(--my, 0) * -3px)) rotateX(calc(var(--my, 0) * -1.2deg)) rotateY(calc(var(--mx, 0) * 1.2deg));
    transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), box-shadow 0.3s;
    animation: cardEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .login-box:hover {
    box-shadow: 0 35px 80px rgba(0, 0, 0, 0.85),
      0 0 50px rgba(0, 242, 254, 0.15),
      inset 0 1px 3px rgba(255, 255, 255, 0.2);
  }

  @keyframes cardEnter {
    0% {
      opacity: 0;
      transform: scale(0.95) translateY(45px);
    }

    100% {
      opacity: 1;
    }
  }

  /* Futuristic overlay status capsule badge */
  .login-badge {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 88px;
    height: 88px;
    background: rgba(12, 8, 36, 0.85);
    border: 1px solid rgba(0, 242, 254, 0.35);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6),
      0 0 25px rgba(0, 242, 254, 0.2),
      inset 0 0 12px rgba(0, 242, 254, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 10;
  }

  .login-badge svg {
    width: 44px;
    height: 44px;
    animation: pulseBadge 3.5s ease-in-out infinite;
  }

  @keyframes pulseBadge {

    0%,
    100% {
      filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.4));
      transform: scale(1);
    }

    50% {
      filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.7));
      transform: scale(1.05);
    }
  }

  /* Grid overlay frame corners */
  .tech-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0, 242, 254, 0.3);
    pointer-events: none;
  }

  .corner-tl {
    top: 12px;
    left: 12px;
    border-right: none;
    border-bottom: none;
  }

  .corner-tr {
    top: 12px;
    right: 12px;
    border-left: none;
    border-bottom: none;
  }

  .corner-bl {
    bottom: 12px;
    left: 12px;
    border-right: none;
    border-top: none;
  }

  .corner-br {
    bottom: 12px;
    right: 12px;
    border-left: none;
    border-top: none;
  }

  /* StellarNet Logo elements and Brand title block */
  .brand-logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 6px;
  }

  .brand-logo-container svg {
    width: 82px;
    height: 82px;
    filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.45));
    animation: floatLogo 6s ease-in-out infinite;
  }

  @keyframes floatLogo {

    0%,
    100% {
      transform: translateY(0);
      filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.4));
    }

    50% {
      transform: translateY(-5px);
      filter: drop-shadow(0 0 16px rgba(0, 242, 254, 0.6));
    }
  }

  .brand-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 4px;
    text-align: center;
    margin: 5px 0;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 10%, #00f2fe 55%, #a651ff 95%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 6px rgba(0, 242, 254, 0.2));
  }

  .brand-subtitle {
    font-size: 10px;
    font-weight: 500;
    color: #9e9bb4;
    text-align: center;
    margin-bottom: 30px;
    line-height: 1.5;
    letter-spacing: 0.8px;
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
    text-transform: uppercase;
  }

  /* Form Elements */
  .form-group {
    position: relative;
    margin-bottom: 22px;
  }

  .form-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #8c88a8;
    margin-bottom: 8px;
    display: block;
    transition: color 0.3s;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    width: 18px;
    height: 18px;
    fill: #7c7797;
    transition: fill 0.3s, transform 0.3s;
    pointer-events: none;
  }

  .input-wrapper input,
  .input-wrapper select {
    width: 100%;
    padding: 12px 16px 12px 46px;
    font-size: 13.5px;
    color: #ffffff;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    font-family: inherit;
  }

  .input-wrapper input:focus,
  .input-wrapper select:focus {
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 15px rgba(0, 242, 254, 0.2),
      inset 0 0 8px rgba(0, 242, 254, 0.08);
  }

  .form-group:focus-within .form-label {
    color: var(--primary);
    text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
  }

  .form-group:focus-within .input-icon {
    fill: var(--primary);
    transform: scale(1.05);
  }

  /* Custom dropdown styling */
  .input-wrapper select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url('data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjN2M3Nzk3IiBoZWlnaHQ9IjI0IiB2aWV3Qm94PSIwIDAgMjQgMjQiIHdpZHRoPSIyNCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNNyAxMGw1IDUgNS01eiIvPjwvc3ZnPg==');
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 18px;
    cursor: pointer;
  }

  .input-wrapper select:focus {
    background-image: url('data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjMDBmMmZlIiBoZWlnaHQ9IjI0IiB2aWV3Qm94PSIwIDAgMjQgMjQiIHdpZHRoPSIyNCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNNyAxMGw1IDUgNS01eiIvPjwvc3ZnPg==');
  }

  .input-wrapper select option {
    background-color: #0b0821;
    color: #ffffff;
    padding: 10px;
  }

  .input-wrapper input::placeholder {
    color: #555171;
  }

  /* Animated neon login button */
  .login-box button {
    position: relative;
    width: 100%;
    padding: 13px 20px;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #ffffff;
    background: linear-gradient(135deg, #00f2fe 0%, #4facfe 45%, #7f00ff 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25), 0 0 25px rgba(127, 0, 255, 0.15);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    margin-top: 8px;
    text-transform: uppercase;
  }

  .login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 242, 254, 0.35), 0 0 35px rgba(127, 0, 255, 0.25);
  }

  .login-box button:active {
    transform: translateY(1px);
  }

  /* Sweeping light trail animation */
  .login-box button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.45) 50%,
        rgba(255, 255, 255, 0) 100%);
    transform: skewX(-20deg);
    transition: 0.7s;
  }

  .login-box button:hover::before {
    left: 180%;
  }

  /* Transformed HUD Warning Toast notifications */
  .alert {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100005;
    background: rgba(14, 8, 38, 0.88);
    border: 1px solid rgba(220, 53, 69, 0.45);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
      0 0 25px rgba(220, 53, 69, 0.2),
      inset 0 0 10px rgba(220, 53, 69, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 14px;
    padding: 15px 24px;
    color: #ff8e95 !important;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    animation: alertHudToast 4.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
  }

  .alert-warning {
    color: #ff8e95;
  }

  @keyframes alertHudToast {
    0% {
      transform: translateY(-20px) scale(0.9);
      opacity: 0;
    }

    8% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    90% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    100% {
      transform: translateY(-25px) scale(0.9);
      opacity: 0;
      visibility: hidden;
    }
  }

  /* Cyber security blockchain footer badge */
  .login-footer-info {
    margin-top: 24px;
    text-align: center;
    font-size: 10px;
    color: #5d5982;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .login-footer-info svg {
    width: 12px;
    height: 12px;
    fill: #5d5982;
  }

  /* ─── OR Divider ─── */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 18px;
  }

  .or-divider::before,
  .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
  }

  .or-divider span {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #5d5982;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ─── Social Login Buttons ─── */
  .social-row {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
  }

  .social-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 10px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #c8c4e8;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    text-decoration: none;
  }

  .social-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(0, 242, 254, 0.3);
    box-shadow: 0 0 14px rgba(0, 242, 254, 0.12);
    transform: translateY(-2px);
    color: #ffffff;
  }

  .social-btn svg {
    width: 17px;
    height: 17px;
    flex-shrink: 0;
  }

  /* ─── Create Account Link Row ─── */
  .create-account-row {
    text-align: center;
    margin-top: 6px;
    margin-bottom: 4px;
    font-size: 12px;
    color: #6e6a8a;
    letter-spacing: 0.3px;
  }

  .create-account-row a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    margin-left: 4px;
    transition: color 0.2s, text-shadow 0.2s;
  }

  .create-account-row a:hover {
    color: #ffffff;
    text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
  }

  /* Responsive breakpoints */
  @media (max-width: 480px) {
    .login-box {
      padding: 55px 24px 30px 24px;
      width: 100%;
    }

    .brand-title {
      font-size: 24px;
      letter-spacing: 2.5px;
    }

    .brand-subtitle {
      font-size: 9px;
    }

    .social-row {
      flex-direction: column;
    }
  }
</style>

<div class="login-wrapper">
  <!-- Glowing Space Canvas particles -->
  <canvas id="space-canvas"></canvas>

  <!-- Ambient Nebulas -->
  <div class="nebula-purple"></div>
  <div class="nebula-cyan"></div>

  <!-- Wide Aurora Sun-glow behind planet -->
  <div class="sun-glow"></div>

  <!-- Wide revolving planet horizon -->
  <div class="planet-horizon">
    <div class="planet-texture"></div>
    <div class="planet-shading"></div>
  </div>

  <!-- Floating Vector background stars -->
  <div class="star-wrapper star-1">
    <svg class="floating-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C12 7.5 7.5 12 2 12C7.5 12 12 16.5 12 22C12 16.5 16.5 12 22 12C16.5 12 12 7.5 12 2Z"
        fill="url(#starGlow1)" />
      <defs>
        <radialGradient id="starGlow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
          gradientTransform="translate(12 12) rotate(90) scale(10)">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="45%" stop-color="#00f2fe" />
          <stop offset="100%" stop-color="rgba(0, 242, 254, 0)" />
        </radialGradient>
      </defs>
    </svg>
  </div>
  <div class="star-wrapper star-2">
    <svg class="floating-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C12 7.5 7.5 12 2 12C7.5 12 12 16.5 12 22C12 16.5 16.5 12 22 12C16.5 12 12 7.5 12 2Z"
        fill="url(#starGlow2)" />
      <defs>
        <radialGradient id="starGlow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
          gradientTransform="translate(12 12) rotate(90) scale(10)">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="45%" stop-color="#7f00ff" />
          <stop offset="100%" stop-color="rgba(127, 0, 255, 0)" />
        </radialGradient>
      </defs>
    </svg>
  </div>
  <div class="star-wrapper star-3">
    <svg class="floating-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C12 7.5 7.5 12 2 12C7.5 12 12 16.5 12 22C12 16.5 16.5 12 22 12C16.5 12 12 7.5 12 2Z"
        fill="url(#starGlow3)" />
      <defs>
        <radialGradient id="starGlow3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
          gradientTransform="translate(12 12) rotate(90) scale(10)">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="45%" stop-color="#00f2fe" />
          <stop offset="100%" stop-color="rgba(0, 242, 254, 0)" />
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- Centered Glass loginbox -->
  <div class="login-box">

    <!-- Top capsule badge overlapping top border -->

<!-- Canvas background & Mouse movement handler scripts -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. Initialize space background particle system
    const canvas = document.getElementById('space-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    const stars = [];
    const dynamicStars = [];
    const dust = [];

    // Ambient stars setup
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 1.3,
        color: `rgba(255, 255, 255, ${Math.random() * 0.7})`
      });
    }

    // Twinkling stars setup
    for (let i = 0; i < 35; i++) {
      dynamicStars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 2 + 0.6,
        speed: 0.03 + Math.random() * 0.04,
        phase: Math.random() * Math.PI * 2
      });
    }

    // Interactive rising stellar dust setup
    for (let i = 0; i < 45; i++) {
      dust.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 2.5 + 1.2,
        vx: (Math.random() - 0.5) * 0.15,
        vy: -0.12 - Math.random() * 0.25,
        color: Math.random() > 0.45
          ? 'rgba(0, 242, 254, 0.16)'
          : 'rgba(127, 0, 255, 0.16)'
      });
    }

    // Render loop
    function renderLoop() {
      ctx.clearRect(0, 0, width, height);

      // Draw background stars
      stars.forEach(star => {
        ctx.fillStyle = star.color;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });

      // Draw background network constellation lines
      ctx.strokeStyle = 'rgba(0, 242, 254, 0.04)';
      ctx.lineWidth = 0.6;
      for (let i = 0; i < dynamicStars.length; i++) {
        for (let j = i + 1; j < dynamicStars.length; j++) {
          const dx = dynamicStars[i].x - dynamicStars[j].x;
          const dy = dynamicStars[i].y - dynamicStars[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(dynamicStars[i].x, dynamicStars[i].y);
            ctx.lineTo(dynamicStars[j].x, dynamicStars[j].y);
            ctx.stroke();
          }
        }
      }

      // Draw twinkling stars
      dynamicStars.forEach(star => {
        star.phase += star.speed;
        const alpha = (Math.sin(star.phase) + 1) / 2 * 0.75 + 0.25;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();

        // Additional faint star aura 
        ctx.fillStyle = `rgba(0, 242, 254, ${alpha * 0.2})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size * 3.5, 0, Math.PI * 2);
        ctx.fill();
      });

      // Draw rising space dust
      dust.forEach(d => {
        d.y += d.vy;
        d.x += d.vx;

        if (d.y < -10) d.y = height + 10;
        if (d.x < -10) d.x = width + 10;
        if (d.x > width + 10) d.x = -10;

        ctx.fillStyle = d.color;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    // 2. Mouse Parallax Coordinate tracker
    let targetMx = 0;
    let targetMy = 0;
    let currentMx = 0;
    let currentMy = 0;

    document.addEventListener('mousemove', (e) => {
      // Calculate normal offset: -1.0 to 1.0
      targetMx = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
      targetMy = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
    });

    // Smooth lerping transition loop to avoid jerky motions
    function parallaxLerp() {
      currentMx += (targetMx - currentMx) * 0.08;
      currentMy += (targetMy - currentMy) * 0.08;

      document.documentElement.style.setProperty('--mx', currentMx.toFixed(4));
      document.documentElement.style.setProperty('--my', currentMy.toFixed(4));

      requestAnimationFrame(parallaxLerp);
    }
    requestAnimationFrame(parallaxLerp);
  });
</script>
